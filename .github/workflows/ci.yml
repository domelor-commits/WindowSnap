name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Package.resolved is gitignored, so key on the manifest; restore-keys
      # still reuses the newest cache after a manifest change.
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build
        run: swift build

      # test.sh uses plain `swift test` when Xcode.app is present (as on the
      # runner); the extra flags inside it are only for bare CLT machines.
      - name: Test
        run: ./test.sh
